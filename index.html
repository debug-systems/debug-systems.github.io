<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debugging Systems</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 2rem 0;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
      margin-bottom: 1rem;
    }

    .services {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.875rem;
      color: #c9d1d9;
    }

    .contact {
      font-size: 0.9rem;
      color: #8b949e;
    }

    .contact a {
      color: #58a6ff;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Debugging Systems</div>
    <p class="tagline">Automação, bots e integrações para negócios.</p>

    <hr class="divider" />

    <p class="section-title">Serviços</p>
    <div class="services">
      <span class="tag">Bots WhatsApp</span>
      <span class="tag">Bots Telegram</span>
      <span class="tag">Automação de processos</span>
      <span class="tag">Integrações de API</span>
      <span class="tag">Firebase &amp; Cloud</span>
    </div>

    <hr class="divider" />

    <p class="contact">
      Contato:
      <a href="mailto:contato@debugging.systems">contato@debugging.systems</a>
    </p>
  </div>

  <footer>&copy; 2026 Debugging Systems</footer>
</body>
</html>
